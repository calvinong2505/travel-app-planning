<style>
  :root{
    --red:#B81E22; --red-2:#A01B20; --red-3:#8A1418;
    --red-soft:#FBEAEA; --red-line:#F0E0E0;
    --ink:#1A1A1A; --t1:#222; --t2:#6A5C5E; --t3:#A89A9C;
    --card:#fff; --line:#F2EAEA;
    --green:#2E7D32; --green-soft:#EAF3EA;
    --gold:#B07D00; --gold-soft:#FBF3D8;
    --r:12px; --r-lg:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Mulish',-apple-system,BlinkMacSystemFont,sans-serif;
    background:#F4EEEE;
    background-image:radial-gradient(circle at 12% 0%,rgba(184,30,34,0.06) 0%,transparent 42%),radial-gradient(circle at 88% 6%,rgba(184,30,34,0.05) 0%,transparent 38%);
    background-attachment:fixed;color:var(--t1);min-height:100vh;-webkit-text-size-adjust:100%;}

  .hd{background:var(--red);background-image:linear-gradient(135deg,#C9282E 0%,var(--red-2) 55%,var(--red-3) 100%);
    color:#fff;padding:18px 22px 22px;position:relative;overflow:hidden;}
  .hd::after{content:'';position:absolute;top:-40%;right:-6%;width:220px;height:220px;
    background:radial-gradient(circle,rgba(255,255,255,0.10) 0%,transparent 70%);pointer-events:none;}
  .hd-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:0.82;position:relative;z-index:1;}
  .hd-title{font-size:24px;font-weight:800;letter-spacing:-0.4px;margin-top:2px;position:relative;z-index:1;}
  .hd-sub{font-size:13px;opacity:0.85;margin-top:2px;position:relative;z-index:1;}
  .hd-back{font-size:13px;font-weight:600;opacity:0.9;cursor:pointer;margin-bottom:7px;position:relative;z-index:1;display:inline-block;}
  .hd-refresh{position:absolute;top:18px;right:20px;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:17px;cursor:pointer;z-index:2;}

  /* Layout: content area; on desktop a two-column board+panel */
  .page{max-width:1280px;margin:0 auto;}
  .board-wrap{display:flex;gap:24px;padding:22px;align-items:flex-start;}
  .board{flex:1;min-width:0;max-width:640px;}
  .panel{flex:0 0 460px;position:sticky;top:18px;}
  @media(max-width:900px){
    .board-wrap{display:block;padding:14px;}
    .board{max-width:none;}
    .panel{display:none;}
  }
  .stop-map{width:100%;height:280px;border:none;border-radius:12px;margin-bottom:6px;background:#EEE8E8;}
  .map-hint{font-size:11px;color:var(--t3);margin-bottom:14px;}

  /* Ideas inbox */
  .ideas{background:var(--gold-soft);border-radius:12px;padding:12px 14px;margin-bottom:16px;}
  .ideas-h{font-size:11px;font-weight:700;color:#8A6D00;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:9px;}
  .idea-chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{background:#fff;border:1px solid #EFE4C0;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;}
  .chip.add{border-style:dashed;color:#8A6D00;background:transparent;}

  /* Day sections */
  .day{margin-bottom:18px;}
  .day-h{font-size:13px;font-weight:800;color:var(--red-2);text-transform:uppercase;letter-spacing:0.5px;margin:0 2px 9px;display:flex;align-items:center;gap:8px;}
  .day-h .count{font-size:11px;font-weight:600;color:var(--t3);}
  .stop{background:var(--card);background-image:linear-gradient(180deg,#fff,#FFFBFB);
    border:1px solid var(--red-line);border-left:3px solid #C9BCBC;border-radius:10px;
    padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(160,27,32,0.05);cursor:pointer;transition:transform .08s;}
  .stop:active{transform:scale(0.995);}
  .stop.booked{border-left-color:var(--green);}
  .stop.planned{border-left-color:var(--gold);}
  .stop.idea{border-left-color:#C9BCBC;}
  .stop.sel{box-shadow:0 0 0 2px var(--red),0 2px 8px rgba(160,27,32,0.12);}
  .stop-top{display:flex;align-items:center;gap:10px;}
  .stop-time{font-size:13px;font-weight:700;color:#666;min-width:46px;}
  .stop-name{font-size:15px;font-weight:700;flex:1;min-width:0;}
  .pill{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 8px;border-radius:6px;flex-shrink:0;}
  .pill.idea{background:#F3EFEF;color:#A89A9A;}
  .pill.planned{background:var(--gold-soft);color:var(--gold);}
  .pill.booked{background:var(--green-soft);color:var(--green);}
  .pill.promoted{background:var(--green);color:#fff;margin-left:6px;}
  .stop.promoted{border-left-color:var(--green);}
  .day-promote{margin-left:auto;font-size:11px;font-weight:700;color:var(--green);background:var(--green-soft);border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;text-transform:none;letter-spacing:0;}
  .stop-meta{font-size:12px;color:var(--t2);margin-top:5px;margin-left:56px;}
  .stop-warn{font-size:11.5px;font-weight:600;color:#B0500A;background:#FDF0E4;border-radius:6px;padding:5px 9px;margin-top:7px;margin-left:56px;}
  .stop.warn{border-left-color:#E08A2B;}
  .route-link{font-size:11.5px;color:var(--t3);font-weight:600;margin:2px 0 8px 26px;padding-left:14px;border-left:2px dashed #D8C4C4;}
  .add-stop{border:1px dashed #D8C4C4;border-radius:10px;padding:11px;text-align:center;font-size:13px;color:var(--t3);cursor:pointer;background:transparent;width:100%;font-family:inherit;}

  /* Panel (desktop placeholder for slice 2) */
  .panel-card{background:var(--card);border:1px solid var(--red-line);border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(160,27,32,0.06);}
  .panel-empty{color:var(--t3);font-size:13px;text-align:center;padding:24px 8px;}

  /* Trips list (entry screen) */
  .card{background:var(--card);background-image:linear-gradient(180deg,#fff,#FFFBFB);
    border:1px solid var(--red-line);border-radius:16px;padding:16px;margin-bottom:11px;box-shadow:0 4px 16px rgba(160,27,32,0.07);cursor:pointer;}
  .card-title{font-size:18px;font-weight:700;}
  .card-sub{font-size:13px;color:var(--t2);margin-top:3px;}

  .btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;}
  .btn.ghost{background:var(--card);color:var(--red-2);border:1px solid var(--red-line);}
  .btn.danger{background:var(--red);color:#fff;border:none;}
  input,select,textarea{width:100%;padding:12px 13px;font-size:16px;border:1px solid var(--red-line);border-radius:10px;background:var(--card);font-family:inherit;margin-bottom:8px;color:var(--t1);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red);}
  label{font-size:12px;font-weight:600;color:var(--t2);display:block;margin:6px 0 4px;}
  .frow{display:flex;gap:8px;}.frow>*{flex:1;}

  .empty{text-align:center;padding:34px 16px;color:var(--t3);font-size:14px;}
  .spin{width:22px;height:22px;border:2.5px solid var(--red-soft);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;margin:34px auto;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .fade-in{animation:fadeIn .28s cubic-bezier(.22,.61,.36,1);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .stop,.card,.chip{animation:rise .3s cubic-bezier(.22,.61,.36,1) backwards;}
  @keyframes rise{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
  .day{animation:fadeIn .3s ease backwards;}

  .fab{position:fixed;bottom:20px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:26px;box-shadow:0 4px 16px rgba(160,27,32,0.4);cursor:pointer;z-index:20;}
  .ov{position:fixed;inset:0;background:rgba(40,20,22,0.5);z-index:50;display:none;align-items:flex-end;justify-content:center;}
  .ov.on{display:flex;}
  .sheet{background:#F4EEEE;border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:82vh;overflow-y:auto;padding:0 18px calc(28px + env(safe-area-inset-bottom));}
  .sheet-h{display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#F4EEEE;padding:16px 0 12px;z-index:2;}
  .sheet-t{font-size:18px;font-weight:800;}
  .x{font-size:22px;color:var(--t3);cursor:pointer;background:none;border:none;width:40px;height:40px;}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:22px;opacity:0;transition:.25s;z-index:100;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .setup{padding:22px;}
</style>
</head>
<body>
<div id="app"><div class="spin"></div></div>
<button class="fab" id="fab" style="display:none" onclick="onFab()">+</button>
<div class="ov" id="ov" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
// ============================================================
// EuroTrip Planning — slice 1 (board: days, stops, ideas)
// ============================================================
var API = localStorage.getItem('plan_api') || '';
var state = { screen:'trips', trip:null, trips:[], stops:[], ideas:[], selected:null, promoted:[] };
function isDesktop(){ return window.innerWidth > 900; }

function apiGet(action, params){
  var q='?action='+action;
  if(params) Object.keys(params).forEach(function(k){ q+='&'+k+'='+encodeURIComponent(params[k]); });
  return fetch(API+q).then(function(r){return r.json();});
}
function apiPost(body){ return fetch(API,{method:'POST',body:JSON.stringify(body)}).then(function(r){return r.json();}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
function uuid(){ return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);}); }
// filter out mangled time values like "+0655" so they never display
function showTime(t){ if(!t) return ''; var s=t.toString(); if(/^[+-]\d{4}$/.test(s)) return ''; return s; }
function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':s); return d.innerHTML; }
function fmtNice(d){ d=normDate(d); if(!d) return ''; var p=d.split('-'); if(p.length!==3) return d;
  var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return parseInt(p[2])+' '+m[parseInt(p[1])-1]; }
// normalise any date value to yyyy-MM-dd, timezone-safe
function normDate(v){
  if(!v) return '';
  var s=v.toString();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if(s.indexOf('T')!==-1 && /^\d{4}-/.test(s)) return s.split('T')[0];
  // raw JS Date string e.g. "Mon Aug 10 2026 00:00:00 GMT+0800" — pull parts directly (no TZ shift)
  var mons={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  var mm=s.match(/\b([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{4})\b/);
  if(mm && mons[mm[1]]){ return mm[3]+'-'+mons[mm[1]]+'-'+('0'+mm[2]).slice(-2); }
  var d=new Date(s);
  if(isNaN(d.getTime())) return '';
  var m2=('0'+(d.getMonth()+1)).slice(-2), d2=('0'+d.getDate()).slice(-2);
  return d.getFullYear()+'-'+m2+'-'+d2;
}
function paint(html){ var a=document.getElementById('app'); a.innerHTML=html; a.classList.remove('fade-in'); void a.offsetWidth; a.classList.add('fade-in');
  var items=a.querySelectorAll('.stop,.card,.day'); for(var i=0;i<items.length;i++){ items[i].style.animationDelay=(i*0.025)+'s'; } }

window.addEventListener('DOMContentLoaded', function(){
  if(!API){ renderSetup(); return; }
  loadTrips();
});

function renderSetup(){
  paint('<div class="hd"><div class="hd-eyebrow">EuroTrip</div><div class="hd-title">Planning · setup</div></div>'+
    '<div class="setup"><label>Paste your Planning API URL (ends in /exec)</label>'+
    '<input id="api-in" placeholder="https://script.google.com/macros/s/…/exec">'+
    '<button class="btn" onclick="saveApi()">Save &amp; start</button></div>');
}
function saveApi(){ var v=document.getElementById('api-in').value.trim(); if(!v){toast('Paste the URL');return;} API=v; localStorage.setItem('plan_api',v); loadTrips(); }

// ---- Trips list (entry) ----
function loadTrips(){
  document.getElementById('fab').style.display='none';
  if(state.trips.length){ state.screen='trips'; renderTrips(); refreshTripsQuiet(); return; }
  document.getElementById('app').innerHTML='<div class="spin"></div>';
  apiGet('getTrips').then(function(d){
    if(!d.ok){ toast('Error: '+d.error); return; }
    state.trips=d.trips; state.screen='trips'; renderTrips();
  }).catch(function(e){ toast('Load failed: '+e.message); });
}
function refreshTripsQuiet(){ apiGet('getTrips').then(function(d){ if(d.ok){state.trips=d.trips; if(state.screen==='trips') renderTrips();} }).catch(function(){}); }

function renderTrips(){
  var h='<div class="hd"><div class="hd-eyebrow">EuroTrip · Planning</div>'+
    '<div class="hd-title">Plan a trip</div>'+
    '<div class="hd-sub">Pick a trip to plan in detail</div></div>'+
    '<div class="page" style="padding:18px;">';
  if(!state.trips.length){ h+='<div class="empty">No trips yet. Create one in the execution app first. ✈️</div>'; }
  else state.trips.forEach(function(t){
    h+='<div class="card" onclick="openBoard(\''+t.trip_id+'\')">'+
      '<div class="card-title">'+esc(t.destination)+'</div>'+
      '<div class="card-sub">'+fmtNice(t.start_date)+' – '+fmtNice(t.end_date)+' · '+esc(t.trip_id)+'</div></div>';
  });
  h+='</div>';
  paint(h);
}

// ---- Board (days + stops + ideas) ----
function openBoard(tripId){
  state.trip=state.trips.filter(function(t){return t.trip_id===tripId;})[0];
  state.screen='board';
  document.getElementById('app').innerHTML='<div class="spin"></div>';
  apiGet('getBoard',{trip:tripId}).then(function(d){
    if(!d.ok){ toast('Error: '+d.error); return; }
    state.stops=d.board.stops||[];
    state.ideas=d.board.ideas||[];
    state.promoted=d.board.promoted||[];
    renderBoard();
  }).catch(function(e){ toast('Load failed: '+e.message); });
}

function tripDayCount(){
  var t=state.trip;
  var sc=normDate(t&&t.start_date), ec=normDate(t&&t.end_date);
  if(sc && ec){
    var a=new Date(sc), b=new Date(ec);
    var n=Math.round((b-a)/86400000)+1;
    if(n>0 && n<40) return n;
  }
  var maxDay=state.stops.reduce(function(m,s){return Math.max(m,s.day||1);},1);
  return maxDay;
}

// ---- Smart timeline helpers (slice 4) ----
// parse "10:00" -> minutes since midnight, or null
function timeToMin(t){ if(!t) return null; var m=t.toString().match(/^(\d{1,2}):(\d{2})$/); if(!m) return null; return parseInt(m[1])*60+parseInt(m[2]); }
function minToTime(m){ if(m==null) return ''; m=((m%1440)+1440)%1440; return ('0'+Math.floor(m/60)).slice(-2)+':'+('0'+(m%60)).slice(-2); }
// parse duration like "2h", "90min", "1.5h", "45" -> minutes, or null
function durToMin(d){ if(!d) return null; var s=d.toString().toLowerCase().trim();
  var hm=s.match(/^(\d+(?:\.\d+)?)\s*h(?:ours?)?(?:\s*(\d+)\s*m)?/); if(hm){ return Math.round(parseFloat(hm[1])*60)+(hm[2]?parseInt(hm[2]):0); }
  var mm=s.match(/^(\d+)\s*m/); if(mm) return parseInt(mm[1]);
  var n=parseFloat(s); if(!isNaN(n)) return Math.round(n); return null; }
// route minutes as number
function routeMin(s){ var n=parseFloat(s&&s.route_mins); return isNaN(n)?null:n; }

// build a timeline for a day's stops (already sorted by time). Returns per-stop
// {endMin, warnings:[...]} keyed by stop_id.
function computeTimeline(dayStops){
  var out={};
  for(var i=0;i<dayStops.length;i++){
    var s=dayStops[i]; var info={endMin:null,warnings:[]};
    var start=timeToMin(showTime(s.time)); var dur=durToMin(s.duration);
    if(start!=null && dur!=null) info.endMin=start+dur;
    else if(start!=null) info.endMin=null; // known start, unknown length
    // overlap with previous stop
    if(i>0){
      var prev=dayStops[i-1]; var prevInfo=out[prev.stop_id];
      var prevEnd=prevInfo?prevInfo.endMin:null;
      var prevStart=timeToMin(showTime(prev.time));
      if(start!=null){
        // impossible connection: prev end + travel > this start
        var travel=routeMin(prev);
        if(prevEnd!=null && travel!=null && prevEnd+travel>start){
          info.warnings.push({type:'tight',text:'Only '+(start-prevEnd)+'m after '+shortName(prev.place_name)+', but '+travel+'m travel needed'});
        } else if(prevEnd!=null && prevEnd>start){
          info.warnings.push({type:'overlap',text:'Overlaps '+shortName(prev.place_name)+' (ends '+minToTime(prevEnd)+')'});
        } else if(prevStart!=null && start<prevStart){
          info.warnings.push({type:'order',text:'Earlier than the stop above it'});
        }
      }
    }
    out[s.stop_id]=info;
  }
  return out;
}
function shortName(n){ n=(n||'').toString(); return n.length>18?n.slice(0,17)+'…':n; }
function routeIcon(mode){ var m={walk:'🚶',metro:'🚇',bus:'🚌',train:'🚆',taxi:'🚕'}; return m[(mode||'').toLowerCase()]||'→'; }

function renderBoard(){
  var t=state.trip;
  var days=tripDayCount();
  var h='<div class="hd"><div class="hd-back" onclick="loadTrips()">‹ Trips</div>'+
    '<button class="hd-refresh" onclick="openBoard(\''+t.trip_id+'\')">↻</button>'+
    '<div class="hd-eyebrow">Planning board</div>'+
    '<div class="hd-title">'+esc(t.destination)+'</div>'+
    '<div class="hd-sub">'+esc(t.trip_id)+' · '+state.stops.length+' stops · '+state.ideas.length+' ideas · '+days+' days</div></div>'+
    '<div class="page"><div class="board-wrap"><div class="board">';

  // ideas inbox
  h+='<div class="ideas"><div class="ideas-h">💡 Ideas inbox · not yet scheduled</div><div class="idea-chips">';
  state.ideas.forEach(function(i){
    h+='<span class="chip" onclick="ideaMenu(\''+i.idea_id+'\')">'+esc(i.text)+'</span>';
  });
  h+='<span class="chip add" onclick="addIdeaForm()">+ add idea</span></div></div>';

  // days
  var startClean = normDate(state.trip.start_date);
  var startDate = startClean ? new Date(startClean) : null;
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var monNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for(var d=1; d<=days; d++){
    var dayStops=state.stops.filter(function(s){return s.day===d;});
    var dateLabel='';
    if(startDate){ var dd=new Date(startDate); dd.setDate(dd.getDate()+(d-1)); dateLabel=dayNames[dd.getDay()]+' '+dd.getDate()+' '+monNames[dd.getMonth()]; }
    var dayHasStops=dayStops.length>0;
    var dayPromoteBtn = dayHasStops ? '<button class="day-promote" onclick="event.stopPropagation();promoteDay('+d+')">Promote day →</button>' : '';
    var tl=computeTimeline(dayStops);
    h+='<div class="day"><div class="day-h">Day '+d+(dateLabel?' · '+dateLabel:'')+' <span class="count">'+(dayStops.length?dayStops.length+' stop'+(dayStops.length>1?'s':''):'')+'</span>'+dayPromoteBtn+'</div>';
    for(var si=0; si<dayStops.length; si++){
      (function(s,idx){
        var isPromoted = state.promoted.indexOf(s.stop_id)!==-1;
        var promBadge = isPromoted ? '<span class="pill promoted">✓ in itinerary</span>' : '';
        var info=tl[s.stop_id]||{endMin:null,warnings:[]};
        var startMin=timeToMin(showTime(s.time));
        // time range label: "10:00–12:00" if we know both, else just start
        var timeLabel = showTime(s.time)||'—';
        if(startMin!=null && info.endMin!=null) timeLabel = showTime(s.time)+'–'+minToTime(info.endMin);
        h+='<div class="stop '+esc(s.status)+(state.selected===s.stop_id?' sel':'')+(isPromoted?' promoted':'')+(info.warnings.length?' warn':'')+'" onclick="openStop(\''+s.stop_id+'\')"><div class="stop-top">'+
          '<span class="stop-time">'+esc(timeLabel)+'</span>'+
          '<span class="stop-name">'+esc(s.place_name)+'</span>'+
          '<span class="pill '+esc(s.status)+'">'+esc(s.status)+'</span>'+
          promBadge+'</div>';
        var meta=[]; if(s.type) meta.push(esc(s.type));
        if(s.est_cost!=='' && s.est_cost!=null) meta.push(esc(s.currency)+' '+s.est_cost);
        if(s.duration) meta.push(esc(s.duration));
        if(s.things_to_do && s.things_to_do.length) meta.push(s.things_to_do.length+' to-do'+(s.things_to_do.length>1?'s':''));
        if(meta.length) h+='<div class="stop-meta">'+meta.join(' · ')+'</div>';
        // warnings
        info.warnings.forEach(function(w){
          h+='<div class="stop-warn">⚠ '+esc(w.text)+'</div>';
        });
        h+='</div>';
        // transport connector to the next stop
        if(idx<dayStops.length-1 && s.route_mode){
          var rm=routeMin(s);
          h+='<div class="route-link">'+routeIcon(s.route_mode)+' '+esc(s.route_mode)+(rm!=null?' · '+rm+' min':'')+(s.route_cost?' · '+esc(s.route_cost):'')+'</div>';
        }
      })(dayStops[si],si);
    }
    h+='<button class="add-stop" onclick="addStopForm('+d+')">+ add stop to Day '+d+'</button>';
    h+='</div>';
  }

  h+='</div>'; // .board
  // desktop side panel: shows the detail editor when a stop is selected
  h+='<div class="panel"><div class="panel-card" id="panel-card">'+
     (state.selected && isDesktop() ? editorHtml(state.selected) : '<div class="panel-empty">Tap a stop to see and edit its details.</div>')+
     '</div></div>';
  h+='</div></div>'; // .board-wrap .page
  paint(h);
  document.getElementById('fab').style.display='block';
}

function closeStop(){ state.selected=null; if(isDesktop()) renderBoard(); else closeSheet(); }

// ---- Promotion: send a stop (or whole day) to the execution itinerary ----
function promoteStop(stopId, replace){
  var s=state.stops.filter(function(x){return x.stop_id===stopId;})[0]; if(!s) return;
  // if editing, capture current field values first so we promote the latest
  if(state.selected===stopId && document.getElementById('ed-name')) collectAllEditorFields();
  if(replace && !confirm('Replace the existing copy in your itinerary? Any changes made on the execution side will be overwritten.')) return;
  toast('Promoting…');
  apiPost({action:'promoteStop',stop_id:stopId,replace:!!replace}).then(function(d){
    if(d.ok){
      if(state.promoted.indexOf(stopId)===-1) state.promoted.push(stopId);
      renderBoard(); toast(d.replaced?'Replaced in itinerary':'Added to itinerary ✓');
    } else if(d.already){
      if(confirm('This stop is already in your itinerary. Replace it?')) promoteStop(stopId,true);
    } else { toast('Error: '+(d.error||'promote failed')); }
  }).catch(function(){toast('Could not promote');});
}
function promoteDay(day){
  var dayStops=state.stops.filter(function(x){return (x.day||0)===day;});
  if(!dayStops.length){ toast('No stops on Day '+day); return; }
  var anyPromoted=dayStops.some(function(s){return state.promoted.indexOf(s.stop_id)!==-1;});
  var msg='Promote all '+dayStops.length+' stop'+(dayStops.length>1?'s':'')+' on Day '+day+' to your itinerary?'+
    (anyPromoted?'\n\nSome are already promoted — those copies will be replaced.':'');
  if(!confirm(msg)) return;
  toast('Promoting day…');
  apiPost({action:'promoteDay',trip_id:state.trip.trip_id,day:day,replace:true}).then(function(d){
    if(d.ok){
      dayStops.forEach(function(s){ if(state.promoted.indexOf(s.stop_id)===-1) state.promoted.push(s.stop_id); });
      renderBoard(); toast('Day '+day+' promoted ✓');
    } else toast('Error: '+(d.error||'promote failed'));
  }).catch(function(){toast('Could not promote');});
}

// build the embedded map for a stop, from address or place name (free output=embed, no API key)
function mapQuery_(s){
  var q = (s.address && s.address.trim()) ? s.address.trim() : (s.place_name && s.place_name.trim() ? s.place_name.trim() : '');
  // if a destination city is known, append it to disambiguate a bare place name
  if(q && state.trip && state.trip.destination && q.toLowerCase().indexOf(state.trip.destination.toLowerCase())===-1){
    q = q + ', ' + state.trip.destination;
  }
  return q;
}
function mapHtml(s){
  var q=mapQuery_(s);
  if(!q) return '<div class="map-hint">Add an address or place name to see a map.</div>';
  var src='https://maps.google.com/maps?q='+encodeURIComponent(q)+'&z=15&output=embed';
  var link = (s.maps_link && s.maps_link.trim()) ? s.maps_link.trim() : 'https://www.google.com/maps/search/'+encodeURIComponent(q);
  return '<iframe class="stop-map" id="stop-map" src="'+src+'" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>'+
    '<div class="map-hint">Showing: '+esc(q)+' · <a href="'+esc(link)+'" target="_blank" style="color:var(--red);font-weight:700">Open in Google Maps ↗</a></div>';
}
// refresh just the map iframe from the current name/address inputs (no full re-render)
function refreshMap(){
  var s=selStop(); if(!s) return;
  var nm=document.getElementById('ed-name'), ad=document.getElementById('ed-addr');
  var tmp={place_name:nm?nm.value:s.place_name, address:ad?ad.value:s.address, maps_link:(document.getElementById('ed-maps')||{}).value||s.maps_link};
  var q=mapQuery_(tmp);
  var frame=document.getElementById('stop-map');
  if(q && frame){ frame.src='https://maps.google.com/maps?q='+encodeURIComponent(q)+'&z=15&output=embed'; }
}

// dynamic to-do / nearby editing (operate on the selected stop's cache)
function selStop(){ return state.stops.filter(function(x){return x.stop_id===state.selected;})[0]; }
// collect ALL current editor field values into the cached stop, so re-rendering
// (e.g. after add/remove to-do or nearby) never loses in-progress edits
function collectAllEditorFields(){
  var s=selStop(); if(!s) return;
  function v(id){ var e=document.getElementById(id); return e?e.value:undefined; }
  if(v('ed-name')!==undefined) s.place_name=v('ed-name');
  if(v('ed-day')!==undefined) s.day=parseInt(v('ed-day'))||s.day;
  if(v('ed-time')!==undefined) s.time=v('ed-time');
  if(v('ed-dur')!==undefined) s.duration=v('ed-dur');
  if(v('ed-type')!==undefined) s.type=v('ed-type');
  if(v('ed-rating')!==undefined) s.rating=v('ed-rating');
  if(v('ed-maps')!==undefined) s.maps_link=v('ed-maps');
  if(v('ed-addr')!==undefined) s.address=v('ed-addr');
  if(v('ed-hours')!==undefined) s.hours=v('ed-hours');
  if(v('ed-cost')!==undefined) s.est_cost=v('ed-cost');
  if(v('ed-ccy')!==undefined) s.currency=v('ed-ccy');
  if(v('ed-notes')!==undefined) s.notes=v('ed-notes');
  if(v('ed-rmode')!==undefined) s.route_mode=v('ed-rmode');
  if(v('ed-rmins')!==undefined) s.route_mins=v('ed-rmins');
  if(v('ed-rcost')!==undefined) s.route_cost=v('ed-rcost');
  if(document.querySelector('[id^="td-"]')) s.things_to_do=collectTodos();
  if(document.querySelector('[id^="nb-name-"]')) s.nearby=collectNearby();
}
function addTodo(){ var s=selStop(); if(!s) return; collectAllEditorFields(); if(!s.things_to_do) s.things_to_do=[]; s.things_to_do.push(''); rerenderEditor(); }
function rmTodo(i){ var s=selStop(); if(!s) return; collectAllEditorFields(); s.things_to_do.splice(i,1); rerenderEditor(); }
function collectTodos(){ var out=[]; var els=document.querySelectorAll('[id^="td-"]'); els.forEach(function(e){ out.push(e.value); }); return out; }
function addNearby(){ var s=selStop(); if(!s) return; collectAllEditorFields(); if(!s.nearby) s.nearby=[]; s.nearby.push({name:'',distance:''}); rerenderEditor(); }
function rmNearby(i){ var s=selStop(); if(!s) return; collectAllEditorFields(); s.nearby.splice(i,1); rerenderEditor(); }
function collectNearby(){ var out=[]; var names=document.querySelectorAll('[id^="nb-name-"]'); var dists=document.querySelectorAll('[id^="nb-dist-"]');
  for(var i=0;i<names.length;i++){ out.push({name:names[i].value,distance:dists[i]?dists[i].value:''}); } return out; }
function rerenderEditor(){
  var html=editorHtml(state.selected);
  if(isDesktop()){ var pc=document.getElementById('panel-card'); if(pc) pc.innerHTML=html; }
  else { document.getElementById('sheet').innerHTML=html; }
}

function saveStopDetail(stopId){
  var s=state.stops.filter(function(x){return x.stop_id===stopId;})[0]; if(!s) return;
  var changes={
    place_name:document.getElementById('ed-name').value.trim(),
    day:parseInt(document.getElementById('ed-day').value)||1,
    time:document.getElementById('ed-time').value.trim(),
    duration:document.getElementById('ed-dur').value.trim(),
    type:document.getElementById('ed-type').value,
    rating:document.getElementById('ed-rating').value.trim(),
    maps_link:document.getElementById('ed-maps').value.trim(),
    address:document.getElementById('ed-addr').value.trim(),
    hours:document.getElementById('ed-hours').value.trim(),
    est_cost:document.getElementById('ed-cost').value,
    currency:document.getElementById('ed-ccy').value.trim(),
    notes:document.getElementById('ed-notes').value.trim(),
    route_mode:document.getElementById('ed-rmode').value,
    route_mins:document.getElementById('ed-rmins').value.trim(),
    route_cost:document.getElementById('ed-rcost').value.trim(),
    things_to_do:collectTodos().filter(function(t){return t.trim();}),
    nearby:collectNearby().filter(function(n){return n.name.trim();})
  };
  // update cache
  Object.keys(changes).forEach(function(k){ s[k]=changes[k]; });
  s.est_cost = s.est_cost===''?'':(parseFloat(s.est_cost)||0);
  if(!isDesktop()) closeSheet();
  state.selected = isDesktop()? stopId : null;
  renderBoard(); toast('Details saved');
  apiPost({action:'updateStop',stop_id:stopId,changes:changes}).catch(function(){toast('Could not save');});
}

function setStatus(stopId,st){
  var s=state.stops.filter(function(x){return x.stop_id===stopId;})[0]; if(!s) return;
  // preserve any in-progress edits in the open editor before re-rendering
  if(state.selected===stopId && document.getElementById('ed-name')){
    s.place_name=document.getElementById('ed-name').value;
    s.time=document.getElementById('ed-time').value;
    s.notes=document.getElementById('ed-notes').value;
    s.things_to_do=collectTodos(); s.nearby=collectNearby();
  }
  s.status=st; toast('Status: '+st);
  if(isDesktop()) renderBoard(); else rerenderEditor();
}
// (status persists on "Save details"; tapping it mid-edit just updates the pill)

function moveStop(stopId,day){
  var s=state.stops.filter(function(x){return x.stop_id===stopId;})[0]; if(s) s.day=day;
  renderBoard(); toast('Moved to Day '+day);
  apiPost({action:'moveStop',stop_id:stopId,day:day}).catch(function(){toast('Could not save');});
}
function delStop(stopId){
  if(!confirm('Delete this stop permanently? (To keep it, use "Return to ideas inbox" instead.)')) return;
  state.stops=state.stops.filter(function(x){return x.stop_id!==stopId;});
  state.selected=null; if(!isDesktop()) closeSheet(); renderBoard(); toast('Deleted');
  apiPost({action:'deleteStop',stop_id:stopId}).catch(function(){toast('Could not save');});
}
// send a scheduled stop back to the ideas inbox (reverse of scheduling)
function returnToInbox(stopId){
  var s=state.stops.filter(function(x){return x.stop_id===stopId;})[0]; if(!s) return;
  var newIdeaId=uuid();
  state.stops=state.stops.filter(function(x){return x.stop_id!==stopId;});
  state.ideas.push({idea_id:newIdeaId,trip_id:state.trip.trip_id,text:s.place_name,type:s.type||'',created:''});
  state.selected=null; if(!isDesktop()) closeSheet(); renderBoard(); toast('Returned to inbox');
  apiPost({action:'unscheduleStop',stop_id:stopId,idea_id:newIdeaId}).catch(function(){toast('Could not save'); openBoard(state.trip.trip_id);});
}

// ---- ideas ----
function ideaMenu(ideaId){
  var i=state.ideas.filter(function(x){return x.idea_id===ideaId;})[0]; if(!i) return;
  var days=tripDayCount(); var opts='';
  for(var d=1; d<=days; d++){ opts+='<button class="btn ghost" style="margin-bottom:6px" onclick="scheduleIdea(\''+ideaId+'\','+d+')">Schedule into Day '+d+'</button>'; }
  openSheet('<div class="sheet-h"><div class="sheet-t">'+esc(i.text)+'</div><button class="x" onclick="closeSheet()">✕</button></div>'+
    '<div style="font-size:13px;color:var(--t2);margin-bottom:12px">Unscheduled idea</div>'+opts+
    '<button class="btn ghost" onclick="delIdea(\''+ideaId+'\')">Delete idea</button>');
}
function scheduleIdea(ideaId,day){
  var idea=state.ideas.filter(function(x){return x.idea_id===ideaId;})[0];
  var newId=uuid();  // real id, generated client-side so it's stable immediately
  state.ideas=state.ideas.filter(function(x){return x.idea_id!==ideaId;});
  state.stops.push({stop_id:newId,trip_id:state.trip.trip_id,day:day,place_name:idea?idea.text:'',type:idea&&idea.type?idea.type:'sightseeing',status:'idea',time:'',est_cost:'',things_to_do:[],nearby:[]});
  closeSheet(); renderBoard(); toast('Scheduled into Day '+day);
  apiPost({action:'scheduleIdea',idea_id:ideaId,day:day,stop_id:newId}).catch(function(){toast('Could not save'); openBoard(state.trip.trip_id);});
}
function delIdea(ideaId){
  state.ideas=state.ideas.filter(function(x){return x.idea_id!==ideaId;});
  closeSheet(); renderBoard(); toast('Idea deleted');
  apiPost({action:'deleteIdea',idea_id:ideaId}).catch(function(){toast('Could not save');});
}
function addIdeaForm(){
  openSheet('<div class="sheet-h"><div class="sheet-t">Add idea</div><button class="x" onclick="closeSheet()">✕</button></div>'+
    '<label>What is it?</label><input id="i-text" placeholder="e.g. Bunkers del Carmel sunset">'+
    '<button class="btn" onclick="saveIdea()">Add to inbox</button>');
}
function saveIdea(){
  var text=document.getElementById('i-text').value.trim(); if(!text){toast('Enter something');return;}
  var newId=uuid();
  state.ideas.push({idea_id:newId,trip_id:state.trip.trip_id,text:text,type:'',created:''});
  closeSheet(); renderBoard(); toast('Idea added');
  apiPost({action:'addIdea',trip_id:state.trip.trip_id,text:text,idea_id:newId}).catch(function(){toast('Could not save');});
}

// ---- add stop (basic in slice 1; full editor in slice 2) ----
function addStopForm(day){
  openSheet('<div class="sheet-h"><div class="sheet-t">Add stop · Day '+day+'</div><button class="x" onclick="closeSheet()">✕</button></div>'+
    '<label>Place name</label><input id="s-name" placeholder="e.g. Sagrada Família">'+
    '<div class="frow"><div><label>Time</label><input id="s-time" placeholder="10:00"></div>'+
    '<div><label>Duration</label><input id="s-dur" placeholder="2h"></div></div>'+
    '<div class="frow"><div><label>Type</label><select id="s-type"><option>sightseeing</option><option>food</option><option>transport</option><option>accommodation</option><option>activity</option></select></div>'+
    '<div><label>Status</label><select id="s-status"><option>idea</option><option>planned</option><option>booked</option></select></div></div>'+
    '<div class="frow"><div><label>Est. cost</label><input type="number" id="s-cost"></div>'+
    '<div><label>Currency</label><input id="s-ccy" value="EUR"></div></div>'+
    '<button class="btn" onclick="saveStop('+day+')">Add stop</button>');
}
function saveStop(day){
  var name=document.getElementById('s-name').value.trim(); if(!name){toast('Enter a name');return;}
  var newId=uuid();
  var stop={
    stop_id:newId, trip_id:state.trip.trip_id, day:day,
    place_name:name, time:document.getElementById('s-time').value.trim(),
    duration:document.getElementById('s-dur').value.trim(),
    type:document.getElementById('s-type').value, status:document.getElementById('s-status').value,
    est_cost:document.getElementById('s-cost').value, currency:document.getElementById('s-ccy').value.trim(),
    things_to_do:[], nearby:[]
  };
  var cached=Object.assign({},stop); cached.est_cost=cached.est_cost===''?'':(parseFloat(cached.est_cost)||0);
  state.stops.push(cached);
  closeSheet(); renderBoard(); toast('Stop added');
  apiPost(Object.assign({action:'addStop'},stop)).catch(function(){toast('Could not save');});
}

// ---- FAB + sheet ----
function onFab(){ if(state.screen==='board') addStopForm(1); }
function openSheet(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('ov').classList.add('on'); }
function closeSheet(){ document.getElementById('ov').classList.remove('on'); }
</script>
</body>
